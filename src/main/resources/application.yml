spring:
  application:
    name: api-banco-digital

  datasource:
    url: jdbc:h2:mem:banco_digital;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true

  h2:
    console:
      enabled: true
      path: /h2-console

  sql:
    init:
      mode: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

notification:
  webhook-url: https://run.mocky.io/v3/9769bf3a-b0b6-477a-a7dd-e0a8b3b527cb

logging:
  level:
    com.banco.digital: DEBUG
